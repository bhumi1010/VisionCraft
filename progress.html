<!DOCTYPE html>
<html>
<head>
  <title>My Progress 📊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>📊 My Progress</h2>
  <button class="logout" onclick="location.href='home.html'">⬅ Back</button>
</div>

<div class="container">

  <h1>✨ Progress Overview</h1>
  <p class="quote">
    “Consistency beats motivation.” 💫
  </p>

  <!-- CIRCLE -->
  <div style="display:flex; justify-content:center; margin:60px 0;">
    <canvas id="circle" width="220" height="220"></canvas>
  </div>

  <!-- DETAILS -->
  <div id="details"></div>

</div>

<script>
async function loadProgress() {
  const res = await fetch("/get-goals");
  const goals = await res.json();

  let totalTasks = 0;
  let completedTasks = 0;

  goals.forEach(g => {
    totalTasks += g.tasks.length;
    completedTasks += g.tasks.filter(t => t.done).length;
  });

  const percent = totalTasks === 0 ? 0 :
    Math.round((completedTasks / totalTasks) * 100);

  drawCircle(percent);
  showDetails(goals, percent);
}

// ===== DRAW CIRCLE =====
function drawCircle(percent) {
  const c = document.getElementById("circle");
  const ctx = c.getContext("2d");

  const center = 110;
  const radius = 90;

  ctx.clearRect(0, 0, 220, 220);

  // background
  ctx.lineWidth = 14;
  ctx.strokeStyle = "#222";
  ctx.beginPath();
  ctx.arc(center, center, radius, 0, 2 * Math.PI);
  ctx.stroke();

  // progress
  ctx.strokeStyle = "#00f5ff";
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#00f5ff";
  ctx.beginPath();
  ctx.arc(
    center,
    center,
    radius,
    -Math.PI / 2,
    (-Math.PI / 2) + (2 * Math.PI * percent / 100)
  );
  ctx.stroke();

  // text
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#fff";
  ctx.font = "28px Segoe UI";
  ctx.fillText(percent + "%", 80, 120);
}

// ===== DETAILS =====
function showDetails(goals, percent) {
  const details = document.getElementById("details");

  details.innerHTML = `
    <h2>${percent}% Completed ✨</h2>
    <p>${goals.length} Goals Active</p>
  `;
}

// LOAD
loadProgress();
</script>

</body>
</html>
