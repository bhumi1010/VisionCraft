<!DOCTYPE html>
<html>
<head>
  <title>My Space ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🌌 My Life Space</h2>
  <button class="logout" onclick="logout()">🚪 Exit</button>
</div>

<div class="container">

  <h1 id="welcome"></h1>

  <p class="quote">
    “You are building a life most people only daydream about.” ✨
  </p>

  <div class="orbs">

    <div class="orb" onclick="location.href='vision.html'">
      🖼️<br>Vision
    </div>

    <div class="orb" onclick="location.href='goals.html'">
      🎯<br>Goals
    </div>

    <div class="orb" onclick="location.href='progress.html'">
      📊<br>Progress
    </div>

  </div>

</div>

<script>
async function checkAuth() {
  const res = await fetch("/auth-check");
  const data = await res.json();
  if (!data.loggedIn) location.href = "/";
  document.getElementById("welcome").innerText =
    "Welcome, " + data.user.name + " ✨";
}

async function logout() {
  await fetch("/logout", { method: "POST" });
  location.href = "/";
}

checkAuth();
</script>

</body>
</html>
