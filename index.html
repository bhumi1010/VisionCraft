<!DOCTYPE html>
<html>
<head>
  <title>VisionCraft ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="split">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>🌌 VisionCraft</h1>

    <p class="big-quote">
      You don’t need a new year.<br>
      You need a new <b>vision</b>. ✨
    </p>

    <p class="soft">
      Design your dream life 💫<br>
      Romanticize discipline 🌱<br>
      Track progress silently 🚀
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="glass-card">
      <h2>✨ Enter Your Space</h2>

      <input id="name" placeholder="Your name 🌷">
      <input id="email" type="email" placeholder="Email ✉️">
      <input id="password" type="password" placeholder="Password 🔒">

      <button onclick="signup()">Create Account ✨</button>
      <button class="ghost" onclick="login()">Login 🚀</button>

      <p id="msg"></p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
